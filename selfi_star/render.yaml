services:
  # Backend Django Service
  - type: web
    name: selfi-star-backend
    env: python
    plan: free
    buildCommand: cd backend && pip install --upgrade pip && pip install -r requirements_py314.txt
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/
    envVars:
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        value: neondb
      - key: DB_USER
        value: neondb_owner
      - key: DB_PASSWORD
        value: npg_Ck3JqV2u5m1x
      - key: DB_HOST
        value: flat-thunder-79099653.aws.neon.tech
      - key: DB_PORT
        value: 5432
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://postworqq.vercel.app,https://postworq.onrender.com,https://your-frontend-domain.onrender.com,https://your-frontend-domain.vercel.app,http://localhost:3000,http://localhost:5173

databases:
  # We're using external Neon database, so no Render database needed
