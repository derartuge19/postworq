<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FlipStar - Modern social media platform for sharing videos and images"
    />
    <link rel="preconnect" href="https://postworq.onrender.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://postworq.onrender.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <title>FlipStar</title>

    <!-- Open Graph / Facebook / WhatsApp / iMessage -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FlipStar" />
    <meta property="og:title" content="FlipStar — Check this out" />
    <meta property="og:description" content="Watch and share videos on FlipStar" />
    <meta property="og:image" content="/logo.jpeg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlipStar — Check this out" />
    <meta name="twitter:description" content="Watch and share videos on FlipStar" />
    <meta name="twitter:image" content="/logo.jpeg" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        -moz-user-select: text;
        user-select: text;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        line-height: 1.5;
        font-size: 16px;
        font-display: swap;
      }

      html,
      body,
      #root,
      .App {
        min-width: 100%;
        min-height: 100%;
      }

      img,
      canvas,
      svg {
        max-width: 100%;
        height: auto;
        display: block;
      }

      video {
        display: block;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
        min-height: 44px;
        font-size: 16px; /* Prevents auto-zoom on iOS */
      }

      /* Mobile Responsive Styles */
      @media (max-width: 1024px) {
        /* Hide legacy sidebars on mobile */
        .desktop-sidebar,
        .right-sidebar,
        .left-sidebar,
        .selfie-sidebar,
        .modern-desktop-sidebar,
        aside[class*='sidebar'] {
          display: none !important;
        }

        .video-feed {
          max-width: 100vw !important;
          margin-right: 0 !important;
        }
      }

      @media (max-width: 768px) {
        body {
          font-size: 15px;
          padding: 0;
          margin: 0;
        }

        #root {
          padding-bottom: 0;
        }

        .desktop-sidebar,
        .right-sidebar {
          display: none !important;
        }

        .left-sidebar {
          transform: translateX(-100%);
          box-shadow: 20px 0 50px rgba(0, 0, 0, 0.2);
        }

        .left-sidebar.open {
          transform: translateX(0);
        }

        .mobile-hamburger,
        .drawer-close {
          display: flex !important;
        }

        .mobile-nav {
          display: flex !important;
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          height: 60px;
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(20px);
          border-top: 1px solid rgba(0, 0, 0, 0.1);
          z-index: 1100;
          align-items: center;
          justify-content: space-around;
          padding: 0 10px;
        }

        .mobile-nav button {
          color: #1A1A1A !important;
        }

        .video-feed {
          margin-left: 0 !important;
          margin-right: 0 !important;
          padding: 0 !important;
          width: 100% !important;
          max-width: 100vw !important;
        }
      }

      @media (orientation: portrait) {
        body {
          font-size: clamp(14px, 3vw, 16px);
        }

        button,
        input,
        select,
        textarea {
          min-height: 50px;
          font-size: 16px;
        }

        .mobile-nav {
          height: 70px;
        }
      }

      @media (orientation: landscape) and (max-width: 1024px) {
        body {
          font-size: clamp(13px, 2.5vw, 15px);
        }

        .video-container {
          height: 100vh !important;
        }

        .video-feed {
          padding-bottom: 90px !important;
        }

        .mobile-nav {
          height: 50px;
        }
      }

      @media (min-width: 769px) {
        .mobile-nav {
          display: none !important;
        }
      }

      html {
        scroll-behavior: smooth;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <!-- Skeleton sits outside #root so React replacement never shifts layout -->
    <div id="app-skeleton" style="position:fixed;inset:0;display:flex;flex-direction:column;background:#000;z-index:9999;pointer-events:none">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative">
        <div style="width:100%;max-width:420px;height:100%;background:linear-gradient(180deg,#1a1a1a 0%,#0a0a0a 100%);position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.03) 50%,transparent 100%);animation:shimmer 1.5s infinite"></div>
          <div style="position:absolute;bottom:80px;left:16px;right:70px">
            <div style="width:120px;height:14px;background:rgba(255,255,255,0.1);border-radius:7px;margin-bottom:10px"></div>
            <div style="width:200px;height:12px;background:rgba(255,255,255,0.07);border-radius:6px;margin-bottom:6px"></div>
            <div style="width:160px;height:12px;background:rgba(255,255,255,0.05);border-radius:6px"></div>
          </div>
          <div style="position:absolute;bottom:80px;right:12px;display:flex;flex-direction:column;gap:20px;align-items:center">
            <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1)"></div>
            <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1)"></div>
            <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1)"></div>
          </div>
        </div>
      </div>
      <style>@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}</style>
    </div>
    <div id="root"></div>
    <!-- Fire API warm-up BEFORE any bundle downloads so Render cold-start runs in parallel.
         We store the response in a global so the app can use it without a duplicate request. -->
    <script>
      (function() {
        var BACKEND = 'https://postworq.onrender.com';
        // Only warm up in production (not localhost)
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return;
        try {
          var headers = { 'Accept': 'application/json' };
          // Include auth token so the backend returns full data (is_liked, is_saved, etc.)
          var token = localStorage.getItem('authToken');
          if (token) headers['Authorization'] = 'Token ' + token;
          var p = fetch(BACKEND + '/api/reels/?limit=5&offset=0', {
            method: 'GET',
            headers: headers,
          }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
          window.__warmupFeed = p;
        } catch(e) {}
      })();
    </script>
    <script>
      // Fail-safe: remove skeleton after 2.5 seconds if React doesn't load
      setTimeout(function() {
        var skeleton = document.getElementById('app-skeleton');
        if (skeleton) {
          skeleton.style.transition = 'opacity 0.3s ease';
          skeleton.style.opacity = '0';
          setTimeout(function() { skeleton.remove(); }, 300);
        }
      }, 2500);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
